<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Radiografía Climática del IES Manuela Malasaña</title>

  <!-- Librería A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- ========================================================= -->
  <!-- 1. RECURSOS: MODELOS, IMÁGENES Y VÍDEOS                  -->
  <!-- ========================================================= -->

  <a-assets timeout="10000">

    <!-- Modelo del suelo o plano del centro -->
    <a-asset-item id="parque" src="parque.glb"></a-asset-item>

  </a-assets>


  <!-- ========================================================= -->
  <!-- 2. ENTORNO GENERAL: CIELO Y LUCES                        -->
  <!-- ========================================================= -->

  <!-- Cielo azul -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Luz ambiental general -->
  <a-light 
    type="ambient" 
    color="#FFFFFF" 
    intensity="0.7">
  </a-light>

  <!-- Luz direccional simulando el sol -->
  <a-light 
    type="directional" 
    position="4 8 4" 
    intensity="0.8">
  </a-light>


  <!-- ========================================================= -->
  <!-- 3. MODELO PRINCIPAL                                      -->
  <!-- ========================================================= -->

  <!-- Suelo / mapa del centro -->
  <a-entity 
    gltf-model="#parque"  
    position="0 0 0"  
    rotation="0 0 0"  
    scale="1 1 1">
  </a-entity>


  <!-- ========================================================= -->
  <!-- 4. CÁMARA DEL VISITANTE                                  -->
  <!-- ========================================================= -->

  <a-entity
    id="camara"
    position="4 3.5 40"
    camera
    look-controls
    wasd-controls>
  </a-entity>

</a-scene>

</body>
</html>
